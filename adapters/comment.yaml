site: linkedin
name: comment
description: Comment on a LinkedIn post
domain: www.linkedin.com
strategy: cookie
browser: true

args:
  url:
    positional: true
    type: string
    required: true
    description: "LinkedIn post URL"
  text:
    type: string
    required: true
    description: "Comment text"
  dry-run:
    type: bool
    default: false
    description: "Preview without commenting"

columns: [status, post_url, comment_preview]

pipeline:
  - navigate: ${{ args.url }}
  - wait: 3
  - evaluate: |
      (async () => {
        const postUrl = ${{ args.url | json }};
        const commentText = ${{ args.text | json }};
        const dryRun = ${{ args['dry-run'] | json }};

        if (dryRun) {
          return [{ status: 'DRY_RUN', post_url: postUrl, comment_preview: commentText.slice(0, 200) }];
        }

        // --- DOM interaction (Voyager comment API returns 400 post-2025 redesign) ---
        const editor = document.querySelector('div.ql-editor[contenteditable="true"]');
        if (!editor) throw new Error('Comment editor not found. Is this a post page?');

        // Focus and type
        editor.click();
        editor.focus();
        await new Promise(r => setTimeout(r, 400));
        document.execCommand('insertText', false, commentText);
        await new Promise(r => setTimeout(r, 400));

        if (editor.innerText.trim().length === 0) {
          throw new Error('Text did not land in editor.');
        }

        // Find Post button: sibling of emoji/photo buttons inside the comment form
        const submitBtn = (() => {
          const emojiBtn = document.querySelector('button[title="Open Emoji Keyboard"]');
          if (!emojiBtn) return null;
          // Walk up to form container, then find last button (Post)
          const form = emojiBtn.closest('form') || emojiBtn.closest('[class*="comment-box"]') || emojiBtn.parentElement?.parentElement?.parentElement;
          if (!form) return null;
          const btns = [...form.querySelectorAll('button')];
          // Post button is after emoji + photo buttons and has no aria-label
          return btns.find(b => !b.getAttribute('aria-label') && !b.getAttribute('title') && b.id?.startsWith('ember'));
        })();

        if (!submitBtn) throw new Error('Post button not found.');
        submitBtn.click();
        await new Promise(r => setTimeout(r, 1500));

        // Verify: editor should be empty after successful submit
        if (editor.innerText.trim().length > 0) {
          throw new Error('Submit may have failed — editor still has text.');
        }

        return [{ status: 'COMMENTED', post_url: postUrl, comment_preview: commentText.slice(0, 200) }];
      })()
  - map:
      status: ${{ item.status }}
      post_url: ${{ item.post_url }}
      comment_preview: ${{ item.comment_preview }}
