site: linkedin
name: comment
description: Comment on a LinkedIn post
domain: www.linkedin.com
strategy: cookie
browser: true

args:
  url:
    positional: true
    type: string
    required: true
    description: "LinkedIn post URL"
  text:
    type: string
    required: true
    description: "Comment text"
  reply-to:
    type: string
    default: ""
    description: "Reply under a specific commenter's comment (partial name match, e.g. 'Tina')"
  dry-run:
    type: bool
    default: false
    description: "Preview without commenting"

columns: [status, post_url, comment_preview]

pipeline:
  - navigate: ${{ args.url }}
  - wait: 3
  - evaluate: |
      (async () => {
        const postUrl = ${{ args.url | json }};
        const commentText = ${{ args.text | json }};
        const dryRun = ${{ args['dry-run'] | json }};

        const replyTo = ${{ args['reply-to'] | json }};

        if (dryRun) {
          return [{ status: 'DRY_RUN', post_url: postUrl, comment_preview: (replyTo ? '[reply to ' + replyTo + '] ' : '') + commentText.slice(0, 200) }];
        }

        // --- DOM interaction (Voyager comment API returns 400 post-2025 redesign) ---

        // If reply-to specified, click the matching Reply button first
        if (replyTo) {
          const replyBtn = [...document.querySelectorAll('button[aria-label*="Reply to"]')]
            .find(b => b.getAttribute('aria-label').toLowerCase().includes(replyTo.toLowerCase()));
          if (!replyBtn) throw new Error('Reply button not found for: ' + replyTo);
          replyBtn.click();
          await new Promise(r => setTimeout(r, 800));
        }

        // After clicking Reply there are 2 editors; use the last one (reply editor).
        // For main comments, only 1 editor exists.
        const editors = [...document.querySelectorAll('div.ql-editor[contenteditable="true"]')];
        const editor = editors[editors.length - 1];
        if (!editor) throw new Error('Comment editor not found. Is this a post page?');

        // Focus and type
        editor.click();
        editor.focus();
        await new Promise(r => setTimeout(r, 400));
        document.execCommand('insertText', false, commentText);
        await new Promise(r => setTimeout(r, 400));

        if (editor.innerText.trim().length === 0) {
          throw new Error('Text did not land in editor.');
        }

        // Find Post button: sibling of emoji/photo buttons in the same form as the active editor
        const submitBtn = (() => {
          const form = editor.closest('form') || editor.closest('[class*="comment-box"]') || editor.parentElement?.parentElement?.parentElement?.parentElement;
          if (!form) return null;
          const btns = [...form.querySelectorAll('button')];
          return btns.find(b => !b.getAttribute('aria-label') && !b.getAttribute('title') && b.id?.startsWith('ember'));
        })();

        if (!submitBtn) throw new Error('Post button not found.');
        submitBtn.click();
        await new Promise(r => setTimeout(r, 1500));

        // Verify: editor should be empty after successful submit
        if (editor.innerText.trim().length > 0) {
          throw new Error('Submit may have failed — editor still has text.');
        }

        return [{ status: replyTo ? 'REPLIED' : 'COMMENTED', post_url: postUrl, comment_preview: commentText.slice(0, 200) }];
      })()
  - map:
      status: ${{ item.status }}
      post_url: ${{ item.post_url }}
      comment_preview: ${{ item.comment_preview }}
